  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;
    const { AnimatePresence } = window.FramerMotion;

    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      const fadeTo = useCallback((target, duration = FADE_MS) => {
        const video = videoRef.current;
        if (!video) return;
        if (rafRef.current) cancelAnimationFrame(rafRef.current);

        const start = performance.now();
        const initial = parseFloat(video.style.opacity || 0);

        function step(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          video.style.opacity = initial + (target - initial) * progress;
          if (progress < 1) {
            rafRef.current = requestAnimationFrame(step);
          }
        }
        rafRef.current = requestAnimationFrame(step);
      }, []);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const onLoaded = () => {
          video.style.opacity = "0";
          video.play();
          fadeTo(1);
        };

        const onTimeUpdate = () => {
          if (!fadingOutRef.current && video.duration - video.currentTime <= FADE_OUT_LEAD && video.duration - video.currentTime > 0) {
            fadingOutRef.current = true;
            fadeTo(0);
          }
        };

        const onEnded = () => {
          video.style.opacity = "0";
          setTimeout(() => {
            if (!video) return;
            video.currentTime = 0;
            video.play();
            fadingOutRef.current = false;
            fadeTo(1);
          }, 100);
        };

        video.addEventListener("loadeddata", onLoaded);
        video.addEventListener("timeupdate", onTimeUpdate);
        video.addEventListener("ended", onEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener("loadeddata", onLoaded);
          video.removeEventListener("timeupdate", onTimeUpdate);
          video.removeEventListener("ended", onEnded);
        };
      }, [fadeTo]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ ...style, opacity: 0 }}
        />
      );
    }
    window.FadingVideo = FadingVideo;
  </script>

  <!-- ═══ BlurText ═══ -->
  <script type="text/babel">
    const { motion } = window.FramerMotion;

    function BlurText({ text, className }) {
      const [visible, setVisible] = React.useState(false);
      const containerRef = React.useRef(null);

      React.useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
          { threshold: 0.1 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      const words = text.split(" ");

      return (
        <p ref={containerRef} className={className} style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}>
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
              animate={visible ? {
                filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                opacity: [0, 0.5, 1],
                y: [50, -5, 0],
              } : {}}
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: "easeOut",
                delay: (i * 100) / 1000,
              }}
              style={{ display: "inline-block", marginRight: "0.28em" }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }
    window.BlurText = BlurText;
  </script>
